services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pasakumu_karte}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_app
    environment:
      APP_NAME: ${APP_NAME:-PasakumuKarte}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://birabidon.lat}
      APP_KEY: ${APP_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://birabidon.lat}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://birabidon.lat}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pasakumu_karte}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REVERB_APP_ID: ${REVERB_APP_ID:-pasakumu-karte-id}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-pasakumu-karte-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-pasakumu-karte-secret}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-0.0.0.0}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-8080}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      MAIL_LOG_CHANNEL: ${MAIL_LOG_CHANNEL:-stderr}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@birabidon.lat}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-PasakumuKarte}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-birabidon.lat}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-birabidon.lat}
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  #  Laravel Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_queue
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-PasakumuKarte}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://birabidon.lat}
      APP_KEY: ${APP_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://birabidon.lat}
      DB_CONNECTION: pgsql
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pasakumu_karte}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REVERB_APP_ID: ${REVERB_APP_ID:-pasakumu-karte-id}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-pasakumu-karte-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-pasakumu-karte-secret}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-0.0.0.0}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-8080}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-birabidon.lat}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-birabidon.lat}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      MAIL_LOG_CHANNEL: ${MAIL_LOG_CHANNEL:-stderr}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@birabidon.lat}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-PasakumuKarte}
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - app_network
    restart: unless-stopped

  # Laravel Reverb WebSocket Server
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-PasakumuKarte}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://birabidon.lat}
      APP_KEY: ${APP_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://birabidon.lat}
      DB_CONNECTION: pgsql
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pasakumu_karte}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REVERB_APP_ID: ${REVERB_APP_ID:-pasakumu-karte-id}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-pasakumu-karte-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-pasakumu-karte-secret}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-0.0.0.0}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-8080}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-birabidon.lat}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-birabidon.lat}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      MAIL_LOG_CHANNEL: ${MAIL_LOG_CHANNEL:-stderr}
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - app_network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://birabidon.lat}
        NEXT_PUBLIC_ANDROID_BACKEND_URL: ${NEXT_PUBLIC_ANDROID_BACKEND_URL:-https://birabidon.lat}
        NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY:-pasakumu-karte-key}
        NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST:-birabidon.lat}
        NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT:-443}
        NEXT_PUBLIC_GEOPIFY_API_KEY: ${NEXT_PUBLIC_GEOPIFY_API_KEY:-}
    container_name: nextjs_app
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://birabidon.lat}
      NEXT_PUBLIC_ANDROID_BACKEND_URL: ${NEXT_PUBLIC_ANDROID_BACKEND_URL:-https://birabidon.lat}
      NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY:-pasakumu-karte-key}
      NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST:-birabidon.lat}
      NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT:-443}
      NEXT_PUBLIC_GEOPIFY_API_KEY: ${NEXT_PUBLIC_GEOPIFY_API_KEY:-}
    volumes:
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./backend/storage/app/public:/var/www/storage:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge